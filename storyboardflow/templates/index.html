<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>StoryboardFlow — Upload rough board</title>
    <style>
        :root {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top, #1b2338, #05060a 60%);
            color: #f5f6fa;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
        .panel {
            background: rgba(5, 8, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(2, 4, 8, 0.5);
        }
        h1 {
            margin-top: 0;
            letter-spacing: 0.08em;
            font-size: 1.6rem;
        }
        input[type="file"] {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 16px;
            border: 1px dashed rgba(255,255,255,0.2);
            background: rgba(12, 14, 24, 0.8);
            color: #ccc;
        }
        button {
            margin-top: 1.5rem;
            background: linear-gradient(120deg, #7f5dff, #29abe2);
            border: none;
            border-radius: 999px;
            padding: 0.95rem 2rem;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        ul { line-height: 1.6; opacity: 0.85; }
    </style>
</head>
<body>
    <section class="panel">
        <h1>StoryboardFlow — Upload • Branch • Remix</h1>
        <p>Drop in 4–8 PNG/JPG storyboard frames. We auto-caption them, spin up variants of your frames, and let you experiment with moods and styles. If you select a variant, your choice instantly ripples downstream to subsequent frames.</p>
        <form method="post" action="/create" enctype="multipart/form-data">
            <label style="display:block; font-size:0.9rem; opacity:0.8; margin-bottom:0.35rem;">Choose 4–8 PNG/JPG files</label>
            <input type="file" name="files" accept="image/png,image/jpeg" multiple required />
            <div style="font-size:0.85rem; opacity:0.75; margin-top:0.4rem;" id="file-count">No files selected</div>
            <button type="submit">Create review job</button>
        </form>
    </section>
    <script>
        const fileInput = document.querySelector('input[type="file"]');
        const fileCount = document.getElementById('file-count');
        fileInput.addEventListener('change', () => {
            if (!fileInput.files.length) {
                fileCount.textContent = 'No files selected';
                return;
            }
            fileCount.textContent = `${fileInput.files.length} file(s) selected`;
        });
    </script>
</body>
</html>
